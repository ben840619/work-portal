<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理部總務股 - 工作導航入口網</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <header class="bg-emerald-600 text-white shadow-md py-4 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">🏢 管理部總務股 ｜ 工作導航</h1>
            <span class="text-sm opacity-90">今日事，今日畢</span>
        </div>
    </header>

    <main class="flex-grow max-w-6xl w-full mx-auto p-6">
        
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-8">
            <h2 class="text-lg font-semibold mb-2">👋 歡迎來到總務股工作導航</h2>
            <p class="text-slate-600 text-sm">本頁面整合了我們日常最常使用的系統與表單，點擊下方卡片即可快速跳轉。若有任何系統權限問題，請聯繫總務股分機。</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-md transition-all">
                <div class="text-emerald-600 text-3xl mb-4">🚗</div>
                <h3 class="text-lg font-bold mb-3">日常系統預約</h3>
                <ul class="space-y-3">
                    <li>
                        <a href="https://example.com/car-reserve" target="_blank" class="block text-sm text-slate-600 hover:text-emerald-600 hover:underline">
                            • 公務車使用預約系統 ↗
                        </a>
                    </li>
                    <li>
                        <a href="https://example.com/meeting-room" target="_blank" class="block text-sm text-slate-600 hover:text-emerald-600 hover:underline">
                            • 會議室登記表 ↗
                        </a>
                    </li>
                </ul>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-md transition-all">
                <div class="text-emerald-600 text-3xl mb-4">📝</div>
                <h3 class="text-lg font-bold mb-3">常用表單下載</h3>
                <ul class="space-y-3">
                    <li>
                        <a href="https://example.com/supplies-form" target="_blank" class="block text-sm text-slate-600 hover:text-emerald-600 hover:underline">
                            • 辦公用品申領單 ↗
                        </a>
                    </li>
                    <li>
                        <a href="https://example.com/repair-form" target="_blank" class="block text-sm text-slate-600 hover:text-emerald-600 hover:underline">
                            • 設備修繕通報系統 ↗
                        </a>
                    </li>
                </ul>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-md transition-all">
                <div class="text-emerald-600 text-3xl mb-4">📞</div>
                <h3 class="text-lg font-bold mb-3">聯絡與支援</h3>
                <ul class="space-y-3">
                    <li>
                        <a href="https://example.com/ext-list" target="_blank" class="block text-sm text-slate-600 hover:text-emerald-600 hover:underline">
                            • 常用分機通訊錄 ↗
                        </a>
                    </li>
                    <li>
                        <a href="https://example.com/vendor-list" target="_blank" class="block text-sm text-slate-600 hover:text-emerald-600 hover:underline">
                            • 總務特約廠商名冊 ↗
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </main>

    <footer class="bg-slate-800 text-slate-400 py-6 text-center text-xs mt-12">
        <p>© 2026 管理部總務股 版權所有 ｜ 搭配 GitHub Pages 雲端託管</p>
    </footer>

</body>
</html>
